# backup-agent — compose de DESPLIEGUE para OMV (descarga la imagen de GHCR).
# Pega esto en OMV -> Compose -> Files -> Add (+), nómbralo backup-agent.
# Repo e imagen PÚBLICOS: no hace falta docker login para bajar la imagen.
# (Una sola vez, tras el primer build: pon el paquete en público desde
#  GitHub -> tu perfil -> Packages -> backup-agent -> Package settings -> Public.)

services:
  backup-agent:
    image: ghcr.io/inquisitorinsider/backup-agent:latest
    container_name: backup-agent
    restart: unless-stopped
    pull_policy: always
    environment:
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "CAMBIA-ESTA-CLAVE"        # <<< clave del panel
      TZ: "America/Lima"
    ports:
      - "8090:8000"                              # panel: http://IP-DEL-SERVIDOR:8090
    volumes:
      - backup-agent-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/openmediavault:/host/etc-openmediavault:ro
      # Identidades del sistema (usuarios/contraseñas/Samba), solo lectura:
      - /etc:/host/etc:ro
      - /var/lib/samba:/host/samba:ro
      - /srv/dev-disk-by-uuid-18d0f5c7-6a18-42e3-a170-b5d57fa8e252/compose/Nextcloud/rclone_config:/config/rclone
      - /srv/dev-disk-by-uuid-18d0f5c7-6a18-42e3-a170-b5d57fa8e252:/srv/dev-disk-by-uuid-18d0f5c7-6a18-42e3-a170-b5d57fa8e252:ro
      - /srv/dev-disk-by-uuid-7469580d-0da7-4fef-bbed-250bdc899d08:/srv/dev-disk-by-uuid-7469580d-0da7-4fef-bbed-250bdc899d08:ro
      - /srv/dev-disk-by-uuid-18d0f5c7-6a18-42e3-a170-b5d57fa8e252/Respaldos:/destino-local

volumes:
  backup-agent-data:
    name: backup-agent-data
